{% extends "base.html" %}
{% block content %}
<h3>Edit Appointment</h3>
<div class="card p-4">
    <form method="POST">
        <div class="mb-3">
            <label>Patient</label>
            <select name="patient_id" class="form-control" required>
                {% for patient in patients %}
                <option value="{{ patient.id }}" {% if patient.id == appointment.patient_id %}selected{% endif %}>
                    {{ patient.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label>Doctor</label>
            <select name="doctor_id" class="form-control" required>
                {% for doctor in doctors %}
                <option value="{{ doctor.id }}" {% if doctor.id == appointment.doctor_id %}selected{% endif %}>
                    Dr. {{ doctor.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label>Date</label>
            <input type="date" name="date" class="form-control" value="{{ appointment.date }}" required>
        </div>
        <button class="btn btn-warning">Update Appointment</button>
    </form>
</div>
<a href="/dashboard" class="btn btn-secondary mt-3">Back to Dashboard</a>
{% endblock %}
