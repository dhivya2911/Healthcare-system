{% extends "base.html" %}
{% block content %}
<h2>User Dashboard</h2>
<a href="/book_appointment" class="btn btn-primary mb-3">Book Appointment</a>
<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>Date</th>
            <th>Doctor</th>
        </tr>
    </thead>
    <tbody>
        {% for appt in appointments %}
        <tr>
            <td>{{ appt.date }}</td>
            <td>Dr. {{ appt.doctor }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
